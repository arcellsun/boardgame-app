// ─── AI 게임 검색 (Claude API via 프록시) ──────
async function aiSearchGame(gameName, apiKey) {
  const prompt = `다음 보드게임의 정보를 JSON 형식으로 알려주세요. 설명은 반드시 한국어로 작성해주세요.
게임 이름: ${gameName}

아래 JSON 형식으로만 응답해주세요 (다른 텍스트 없이):
{
  "name": "한국어 게임 이름 (없으면 원래 이름 그대로)",
  "minPlayers": 2,
  "maxPlayers": 4,
  "duration": 60,
  "genre": "전략",
  "difficulty": "보통",
  "description": "게임 소개 2~3문장 (한국어)",
  "objective": "승리 조건 설명 (한국어)",
  "howToPlay": "1. 첫 번째 단계 설명.\n2. 두 번째 단계 설명.\n3. 세 번째 단계 설명.\n(이런 형식으로 번호를 붙여 각 단계를 줄바꿈으로 구분)",
  "components": "주요 구성품 목록 (한국어)",
  "tags": ["태그1", "태그2", "태그3"],
  "bggId": "BoardGameGeek 게임 ID 숫자 (모르면 null)"
}
genre는 반드시 다음 중 하나: 전략, 파티, 협력, 추리, 경제, 카드, RPG, 추상, 패밀리, 기타
difficulty는 반드시 다음 중 하나: 매우 쉬움, 쉬움, 보통, 어려움, 매우 어려움`;

  if (!PROXY_URL || PROXY_URL === "REPLACE_WITH_YOUR_WORKER_URL") {
    throw new Error("Worker URL이 설정되지 않았습니다. index.html 의 PROXY_URL을 Cloudflare Worker 주소로 바꿔주세요.");
  }

  let res;
  try {
    res = await fetch(PROXY_URL, {
      method: "POST",
      mode: "cors",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
      },
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 1024,
        messages: [{ role: "user", content: prompt }],
      }),
    });
  } catch (networkErr) {
    throw new Error(
      "네트워크 오류: 프록시 서버에 연결할 수 없습니다.\n" +
      "• Worker URL이 올바른지 확인해주세요\n" +
      "• 원인: " + networkErr.message
    );
  }
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    const status = res.status;
    if (status === 401) throw new Error("API 키가 올바르지 않습니다. 설정에서 키를 다시 확인해주세요.");
    if (status === 429) throw new Error("API 요청 한도를 초과했습니다. 잠시 후 다시 시도해주세요.");
    throw new Error(err?.error?.message || `API 오류 (${status})`);
  }
  const data = await res.json();
  const text = data.content?.[0]?.text || "";
  const match = text.match(/\{[\s\S]*\}/);
  if (!match) throw new Error("AI 응답 파싱 실패");
  return JSON.parse(match[0]);
}

// ─── Wikipedia 이미지 자동 로딩 ──────────────────────
async function fetchGameImage(gameName) {
  try {
    // 1) 영문 Wikipedia에서 "(board game)" 붙여서 검색
    const queries = [
      gameName + ' (board game)',
      gameName,
    ];
    for (const q of queries) {
      const url = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`;
      const r = await fetch(url);
      if (r.ok) {
        const data = await r.json();
        if (data.thumbnail?.source) return data.thumbnail.source;
      }
    }
    // 2) 한국어 Wikipedia fallback
    const krUrl = `https://ko.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(gameName)}`;
    const kr = await fetch(krUrl);
    if (kr.ok) {
      const krData = await kr.json();
      if (krData.thumbnail?.source) return krData.thumbnail.source;
    }
    return null;
  } catch { return null; }
}

                {["원하는 게임 보유 여부 사전 문의", "인원수에 맞는 테이블·예약 확인", "시간제 요금 & 음료 정책 확인", "초보자는 직원 설명 요청 가능", "앱에서 순번 신청 가능 여부 확인"].map((tip, i) => (
                  <div key={i} style={{ display: "flex", gap: 8, fontSize: 13, color: C.textSub }}>
                    <span style={{ color: C.accent }}>✓</span><span>{tip}</span>
                  </div>
                ))}
              </div>
            </div>

            <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: 16 }}>
              <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 12 }}>🎲 오늘 뭐 할까요?</div>
              <div style={{ color: C.textDim, fontSize: 12, marginBottom: 12 }}>아직 적게 플레이한 게임 추천</div>
              {[...games].sort((a, b) => (stats.gameStats[a.id]?.plays || 0) - (stats.gameStats[b.id]?.plays || 0)).slice(0, 3).map((game) => {
                const plays = stats.gameStats[game.id]?.plays || 0;

                  <div key={game.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 0", borderBottom: `1px solid ${C.border}`, cursor: "pointer" }}

                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 13, fontWeight: 600 }}>{game.name}</div>
                      <div style={{ fontSize: 11, color: C.textDim }}>👥 {game.minPlayers}–{game.maxPlayers}인 · ⏱ {game.duration}분</div>

                    <span style={{ fontSize: 11, color: C.textDim }}>{plays}번 플레이</span>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </main>

      {/* ══ 게임 상세 모달 ══ */}
      {selectedGame && (
        <Modal title={selectedGame.name} onClose={() => setSelectedGame(null)}>
          <GameDetail
            game={selectedGame}
            plays={stats.gameStats[selectedGame.id]?.plays || 0}
            history={history.filter(h => h.gameId === selectedGame.id)}
            onEdit={() => { setEditingGame(selectedGame); setSelectedGame(null); }}
            onAddHistory={() => { setShowAddHistory(true); setSelectedGame(null); }}
            onOpenTimer={() => { setTimerGame(selectedGame); setShowTimer(true); setSelectedGame(null); }}

      {/* ══ 게임 추가/수정 모달 ══ */}
      {(showAddGame || editingGame) && (
        <Modal title={editingGame ? "게임 수정" : "게임 추가"} onClose={() => { setShowAddGame(false); setEditingGame(null); }}>
          <GameForm game={editingGame} apiKey={apiKey} onSave={editingGame ? updateGame : addGame} onClose={() => { setShowAddGame(false); setEditingGame(null); }} onOpenSettings={() => setShowSettings(true)} />

      {/* ══ AI 설정 모달 ══ */}

              Claude API를 사용해 어떤 보드게임이든 이름만 입력하면<br/>
              한국어 설명·목표·플레이 방법을 자동으로 채워줍니다.
            </div>
            <Field label="Anthropic API 키">
              <input
                type="password"
                value={apiKey}
                onChange={e => setApiKey(e.target.value)}
                placeholder="sk-ant-api03-..."
                style={{ width: "100%", padding: "9px 12px", background: C.surface2, border: `1px solid ${apiKey ? C.accent : C.border}`, borderRadius: 8, color: C.text, fontSize: 13, outline: "none", boxSizing: "border-box", fontFamily: "monospace" }}

            </Field>
            <div style={{ fontSize: 11, color: C.textDim, lineHeight: 1.7 }}>
              • API 키는 <a href="https://console.anthropic.com" target="_blank" rel="noopener noreferrer" style={{ color: C.accent }}>console.anthropic.com</a>에서 발급<br/>
              • 키는 이 세션에서만 유지되며 외부로 전송되지 않습니다<br/>
              • claude-haiku 모델 사용 (검색 1회당 약 $0.001)
            </div>
            {apiKey && (
              <div style={{ padding: "8px 12px", background: "#d1fae5", borderRadius: 8, fontSize: 12, color: "#065f46", fontWeight: 600 }}>
                ✅ API 키가 설정되었습니다. 게임 추가 시 🤖 AI 검색을 사용하세요!
              </div>
            )}
            <div style={{ borderTop: `1px solid ${C.border}`, paddingTop: 14 }}>
              <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 10, color: C.textSub }}>💾 데이터 관리</div>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={() => { handleExport(); setShowSettings(false); }}
                  style={{ flex: 1, padding: "9px 0", borderRadius: 8, border: `1px solid ${C.border}`, background: C.surface2, color: C.textSub, fontWeight: 600, fontSize: 13, cursor: "pointer" }}>
                  ⬇ 내보내기
                </button>
                <button onClick={() => { fileInputRef.current.click(); setShowSettings(false); }}
                  style={{ flex: 1, padding: "9px 0", borderRadius: 8, border: `1px solid ${C.border}`, background: C.surface2, color: C.textSub, fontWeight: 600, fontSize: 13, cursor: "pointer" }}>
                  ⬆ 불러오기
                </button>
              </div>
            </div>
            <button onClick={() => setShowSettings(false)}
              style={{ padding: "10px 0", borderRadius: 8, border: "none", background: C.accent, color: "#fff", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>
              확인
            </button>
          </div>
        </Modal>
      )}

      {/* ══ 플레이 기록 추가 모달 ══ */}
      {showAddHistory && (
        <Modal title="플레이 기록 추가" onClose={() => setShowAddHistory(false)}>
          <HistoryForm games={games} onSave={addHistory} onClose={() => setShowAddHistory(false)} />
        </Modal>
      )}

      {/* ══ 위시리스트 추가 모달 ══ */}
      {showAddWishlist && (
        <Modal title="🎁 위시리스트 추가" onClose={() => setShowAddWishlist(false)}>
          <WishlistForm onSave={addWishlistItem} onClose={() => setShowAddWishlist(false)} />
        </Modal>

      {/* ══ 타이머 모달 ══ */}
      {showTimer && (
        <TimerModal gameName={timerGame?.name} onClose={() => { setShowTimer(false); setTimerGame(null); }} />
      )}

      {/* ══ 점수판 모달 ══ */}
      {showScoreSheet && (
        <ScoreSheetModal gameName={scoreSheetGame?.name} onClose={() => { setShowScoreSheet(false); setScoreSheetGame(null); }} />
      )}

      {/* ══ SpeedDial 플로팅 버튼 ══ */}
      <SpeedDial
        onTimer={() => setShowTimer(true)}
        onScoreSheet={() => setShowScoreSheet(true)}
      />
    </div>
  );
}

          <div style={{ width: 80, height: 80, borderRadius: 10, background: C.surface2, border: `1px solid ${C.border}`, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 32 }}>🎲</div>

          { value: `${game.duration}분`, label: "소요시간" },

      <div style={{ display: "flex", gap: 0, borderBottom: `1px solid ${C.border}`, marginBottom: 14 }}>
        {[{ id: "info", label: "게임 설명" }, { id: "how", label: "플레이 방법" }, { id: "history", label: "기록" }].map(t => (
          <button key={t.id} onClick={() => setTab(t.id)}
            style={{ padding: "8px 14px", fontSize: 12, fontWeight: tab === t.id ? 700 : 400, color: tab === t.id ? C.accent : C.textDim,
              borderBottom: `2px solid ${tab === t.id ? C.accent : "transparent"}`, background: "none", border: "none",
              cursor: "pointer" }}>
            {t.label}
          </button>
        ))}
      </div>

      {tab === "info" && (
        <div style={{ fontSize: 13, lineHeight: 1.7 }}>
          <p style={{ color: C.textSub, marginBottom: 12 }}>{game.description}</p>
          {game.objective && (
            <InfoSection label="🎯 목표">

            </InfoSection>

          {game.components && (
            <InfoSection label="📦 구성품">
              <p style={{ color: C.textSub }}>{game.components}</p>
            </InfoSection>
          )}
          {game.notes && (
            <InfoSection label="📝 메모">
              <p style={{ color: C.textSub, fontStyle: "italic" }}>{game.notes}</p>
            </InfoSection>
          )}
          {game.videoUrl && (
            <a href={game.videoUrl} target="_blank" rel="noopener noreferrer"

              ▶ 설명 영상 보기
            </a>
          )}

      {tab === "how" && (

                <ol style={{ paddingLeft: 18, color: C.textSub }}>
                  {lines.map((line, i) => {
                    const clean = line.replace(/^\d+[\.\)]\s*/, '').trim();
                    return <li key={i} style={{ marginBottom: 6 }}>{clean}</li>;
                  })}
                </ol>
              );
            }
            return (
              <ol style={{ paddingLeft: 18, color: C.textSub }}>
                {lines.map((line, i) => <li key={i} style={{ marginBottom: 6 }}>{line.trim()}</li>)}
              </ol>

          })()

          }

      {tab === "history" && (
        <div>

              <div key={h.id} style={{ padding: "10px 0", borderBottom: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div>
                  <span style={{ fontSize: 11, color: C.textDim }}>{h.date}</span>
                  <div style={{ fontSize: 13, color: C.textSub, marginTop: 2 }}>{h.players.join(", ")}</div>
                </div>
                {h.winner && <span style={{ fontSize: 12, color: "#fbbf24", fontWeight: 600 }}>🏆 {h.winner}</span>}
              </div>
            ))
          }
        </div>
      )}

      <div style={{ display: "grid", gap: 8, marginTop: 20 }}>
        <div style={{ display: "flex", gap: 8 }}>
          <button onClick={onEdit}
            style={{ flex: 1, padding: "10px 0", borderRadius: 8, border: `1px solid ${C.accent}`, background: "none", color: C.accent, fontWeight: 600, fontSize: 13, cursor: "pointer" }}>
            ✏️ 수정
          </button>
          <button onClick={onAddHistory}
            style={{ flex: 1, padding: "10px 0", borderRadius: 8, border: "none", background: C.accent, color: "#fff", fontWeight: 600, fontSize: 13, cursor: "pointer" }}>
            🎮 기록 추가
          </button>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <button onClick={onOpenTimer}
            style={{ flex: 1, padding: "9px 0", borderRadius: 8, border: `1px solid #f59e0b`, background: "#fff8e1", color: "#b45309", fontWeight: 600, fontSize: 13, cursor: "pointer" }}>
            ⏱ 타이머
          </button>
          <button onClick={onOpenScoreSheet}
            style={{ flex: 1, padding: "9px 0", borderRadius: 8, border: `1px solid #7c3aed`, background: "#f5f3ff", color: "#5b21b6", fontWeight: 600, fontSize: 13, cursor: "pointer" }}>
            📝 점수판
          </button>
        </div>
      </div>
    </div>
  );
}

// ── 게임 폼 (로컬 DB + AI 검색) ─────────────────
function GameForm({ game, apiKey, onSave, onClose, onOpenSettings }) {
  const [form, setForm] = useState(game || {
    name: "", genre: "전략", minPlayers: 2, maxPlayers: 4, duration: 60, difficulty: "보통",
    description: "", objective: "", howToPlay: "", components: "", videoUrl: "", imageUrl: "", notes: "", tags: [],
  });
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const [tagsText, setTagsText] = useState((game?.tags || []).join(", "));

  // 로컬 DB 검색 상태
  const [localQuery, setLocalQuery] = useState("");
  const [localResults, setLocalResults] = useState([]);

  // AI 검색 상태
  const [aiLoading, setAiLoading] = useState(false);
  const [aiError, setAiError] = useState("");
  const [imgLoading, setImgLoading] = useState(false);

  const handleLocalSearch = (q) => {
    setLocalQuery(q);
    if (!q.trim()) { setLocalResults([]); return; }
    const lower = q.toLowerCase();
    const results = BOARDGAME_LOCAL_DB.filter(g =>
      g.name.includes(q) ||
      g.englishName.toLowerCase().includes(lower) ||
      g.description.includes(q) ||
      (g.tags || []).some(t => t.includes(q)) ||
      g.genre.includes(q)
    ).slice(0, 8);
    setLocalResults(results);
  };

  const handleLocalSelect = (item) => {
    const duration = Math.round((item.minTime + item.maxTime) / 2);
    const newName = item.name;
    setForm(f => ({
      ...f,
      name: newName,
      minPlayers: item.minPlayers,
      maxPlayers: item.maxPlayers,
      duration,
      description: item.description,
      genre: GENRES.includes(item.genre) ? item.genre : "전략",
      difficulty: mapDifficulty(item.difficulty),
    }));
    setTagsText((item.tags || []).join(", "));
    setLocalResults([]);
    setLocalQuery("");
    // Wikipedia 이미지 자동 로딩
    setImgLoading(true);
    fetchGameImage(newName).then(url => {
      if (url) set("imageUrl", url);
      setImgLoading(false);
    });
  };

  const handleAiSearch = async () => {
    const query = localQuery.trim() || form.name.trim();
    if (!query) return alert("게임 이름을 먼저 입력해주세요.");
    if (!apiKey) { onOpenSettings?.(); return; }
    setAiLoading(true);
    setAiError("");
    setLocalResults([]);
    try {
      const result = await aiSearchGame(query, apiKey);
      setForm(f => ({
        ...f,
        name: result.name || f.name,
        minPlayers: result.minPlayers || f.minPlayers,
        maxPlayers: result.maxPlayers || f.maxPlayers,
        duration: result.duration || f.duration,
        genre: GENRES.includes(result.genre) ? result.genre : f.genre,
        difficulty: DIFFICULTIES.includes(result.difficulty) ? result.difficulty : f.difficulty,
        description: result.description || f.description,
        objective: result.objective || f.objective,
        howToPlay: result.howToPlay || f.howToPlay,
        components: result.components || f.components,
      }));
      setTagsText((result.tags || []).join(", "));
      setLocalQuery("");
      // Wikipedia 이미지 자동 로딩
      setImgLoading(true);
      fetchGameImage(result.name || query).then(url => {
        if (url) set("imageUrl", url);
        setImgLoading(false);
      });
    } catch (e) {
      setAiError(e.message || "AI 검색 실패");
    } finally {
      setAiLoading(false);
    }
  };

  const handleSave = () => {
    if (!form.name.trim()) return alert("게임 이름을 입력해주세요.");
    onSave({ ...form, tags: tagsText.split(",").map(t => t.trim()).filter(Boolean) });
  };

  return (
    <div style={{ display: "grid", gap: 14 }}>

      {/* ── 검색 섹션 ── */}
      <div style={{ background: C.accentDim, border: `1px solid ${C.accent}33`, borderRadius: 10, padding: 12 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: C.accent }}>🔍 게임 검색</div>
          <div style={{ fontSize: 10, color: C.textDim }}>
            {apiKey ? <span style={{ color: "#16a34a", fontWeight: 600 }}>🤖 AI 검색 사용 가능</span> : <span>AI 검색: <button onClick={onOpenSettings} style={{ background: "none", border: "none", color: C.accent, fontSize: 10, cursor: "pointer", padding: 0, fontWeight: 600 }}>API 키 설정 →</button></span>}
          </div>
        </div>
        <div style={{ display: "flex", gap: 6 }}>
          <div style={{ position: "relative", flex: 1 }}>
          <input
            value={localQuery}
            onChange={e => handleLocalSearch(e.target.value)}
            onKeyDown={e => e.key === "Enter" && apiKey && handleAiSearch()}
            placeholder="게임 이름 검색 (예: 카탄, Wingspan...)"
            style={{ width: "100%", padding: "8px 12px", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, fontSize: 12, color: C.text, outline: "none", boxSizing: "border-box" }}
          />
          {localResults.length > 0 && (
            <div style={{ position: "absolute", top: "calc(100% + 4px)", left: 0, right: 0, border: `1px solid ${C.border}`, borderRadius: 8, overflow: "hidden", background: C.surface, zIndex: 100, boxShadow: "0 4px 16px #0002" }}>
              {localResults.map((r, i) => (
                <div key={r.id} onClick={() => handleLocalSelect(r)}
                  style={{
                    padding: "9px 12px", fontSize: 12, cursor: "pointer",
                    borderBottom: i < localResults.length - 1 ? `1px solid ${C.border}` : "none",
                    background: C.surface, display: "flex", justifyContent: "space-between", alignItems: "center",
                  }}
                  onMouseEnter={e => e.currentTarget.style.background = C.surface2}
                  onMouseLeave={e => e.currentTarget.style.background = C.surface}
                >
                  <div>
                    <span style={{ fontWeight: 600, color: C.text }}>{r.name}</span>
                    <span style={{ color: C.textDim, fontSize: 11, marginLeft: 6 }}>{r.englishName}</span>
                  </div>
                  <div style={{ display: "flex", gap: 4, flexShrink: 0, marginLeft: 8 }}>
                    <span style={{ fontSize: 10, padding: "2px 6px", borderRadius: 3, background: C.surface2, color: C.textDim, whiteSpace: "nowrap" }}>
                      {r.minPlayers}–{r.maxPlayers}인
                    </span>
                    <span style={{ fontSize: 10, padding: "2px 6px", borderRadius: 3, background: C.accentDim, color: C.accent, whiteSpace: "nowrap" }}>
                      {r.genre}
                    </span>
                  </div>
                </div>
              ))}
            </div>
          )}
          </div>
          <button onClick={handleAiSearch} disabled={aiLoading}
            style={{ padding: "8px 12px", borderRadius: 8, border: "none", background: apiKey ? C.accent : C.border, color: apiKey ? "#fff" : C.textDim, fontSize: 12, fontWeight: 700, cursor: apiKey ? "pointer" : "default", whiteSpace: "nowrap", opacity: aiLoading ? 0.6 : 1, flexShrink: 0 }}>
            {aiLoading ? "검색 중…" : "🤖 AI 검색"}
          </button>

// ── 타이머 모달 ──────────────────────────────
function TimerModal({ gameName, onClose }) {
  const PRESETS = [
    { label: "30초", seconds: 30 },
    { label: "1분 (우봉고)", seconds: 60 },
    { label: "1분 30초", seconds: 90 },
    { label: "2분", seconds: 120 },
    { label: "3분", seconds: 180 },
    { label: "5분", seconds: 300 },
  ];
  const [selected, setSelected] = useState(60);
  const [timeLeft, setTimeLeft] = useState(60);
  const [running, setRunning] = useState(false);
  const [custom, setCustom] = useState("");
  const intervalRef = useRef(null);

  useEffect(() => {
    if (running) {
      intervalRef.current = setInterval(() => {
        setTimeLeft(t => {
          if (t <= 1) {
            setRunning(false);
            clearInterval(intervalRef.current);
            if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
            return 0;
          }
          return t - 1;
        });
      }, 1000);
    }
    return () => clearInterval(intervalRef.current);
  }, [running]);

  const handleStart = () => { if (timeLeft > 0) setRunning(true); };
  const handlePause = () => { setRunning(false); clearInterval(intervalRef.current); };
  const handleReset = () => { setRunning(false); clearInterval(intervalRef.current); setTimeLeft(selected); };
  const handleSelect = (s) => { setSelected(s); setTimeLeft(s); setRunning(false); clearInterval(intervalRef.current); };

  const isFinished = timeLeft === 0;
  const progress = selected > 0 ? timeLeft / selected : 0;
  const mins = Math.floor(timeLeft / 60);
  const secs = timeLeft % 60;
  const timeStr = `${mins}:${String(secs).padStart(2, "0")}`;
  const circumference = 2 * Math.PI * 54;
  const strokeOffset = circumference * (1 - progress);

  return (
    <Modal title={`⏱ 타이머${gameName ? ` — ${gameName}` : ""}`} onClose={onClose}>
      <div style={{ textAlign: "center" }}>
        {/* 프리셋 버튼 */}
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6, justifyContent: "center", marginBottom: 20 }}>
          {PRESETS.map(p => (
            <button key={p.seconds} onClick={() => handleSelect(p.seconds)}
              style={{ padding: "5px 12px", borderRadius: 20, fontSize: 12, fontWeight: 600, cursor: "pointer",
                background: selected === p.seconds ? C.accent : C.surface2,
                color: selected === p.seconds ? "#fff" : C.textSub,
                border: `1px solid ${selected === p.seconds ? C.accent : C.border}` }}>
              {p.label}
            </button>
          ))}
        </div>

        {/* 원형 타이머 */}
        <div style={{ position: "relative", display: "inline-block", marginBottom: 20 }}>
          <svg width="140" height="140" viewBox="0 0 128 128">
            <circle cx="64" cy="64" r="54" fill="none" stroke={C.border} strokeWidth="8"/>
            <circle cx="64" cy="64" r="54" fill="none"
              stroke={isFinished ? "#ef4444" : running ? "#16a34a" : C.accent}
              strokeWidth="8" strokeLinecap="round"
              strokeDasharray={circumference}
              strokeDashoffset={strokeOffset}
              transform="rotate(-90 64 64)"
              style={{ transition: "stroke-dashoffset 0.8s linear, stroke 0.3s" }}
            />
          </svg>
          <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
            <div style={{ fontSize: 34, fontWeight: 800, fontVariantNumeric: "tabular-nums", color: isFinished ? "#ef4444" : C.text, letterSpacing: "-1px" }}>{timeStr}</div>
            {isFinished && <div style={{ fontSize: 13, color: "#ef4444", fontWeight: 700, marginTop: 2 }}>⏰ 완료!</div>}
            {running && !isFinished && <div style={{ fontSize: 11, color: "#16a34a", fontWeight: 600 }}>진행 중</div>}
          </div>
        </div>

        {/* 컨트롤 버튼 */}
        <div style={{ display: "flex", gap: 8, justifyContent: "center", marginBottom: 16 }}>
          {!running ? (
            <button onClick={handleStart}
              style={{ padding: "10px 28px", borderRadius: 8, border: "none", background: isFinished ? C.border : C.accent, color: isFinished ? C.textDim : "#fff", fontWeight: 700, fontSize: 14, cursor: isFinished ? "default" : "pointer" }}>
              ▶ 시작
            </button>
          ) : (
            <button onClick={handlePause}
              style={{ padding: "10px 28px", borderRadius: 8, border: "none", background: "#f59e0b", color: "#fff", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>
              ⏸ 일시정지
            </button>
          )}
          <button onClick={handleReset}
            style={{ padding: "10px 20px", borderRadius: 8, border: `1px solid ${C.border}`, background: C.surface2, color: C.textSub, fontWeight: 600, fontSize: 14, cursor: "pointer" }}>
            ↺ 리셋
          </button>
        </div>

        {/* 직접 입력 */}
        <div style={{ display: "flex", gap: 6, justifyContent: "center", alignItems: "center" }}>
          <input type="number" min="5" max="3600" value={custom}
            onChange={e => setCustom(e.target.value)}
            onKeyDown={e => { if (e.key === "Enter") { const s = parseInt(custom); if (s > 0) { handleSelect(s); setCustom(""); } } }}
            placeholder="초 직접 입력"
            style={{ width: 110, padding: "6px 10px", borderRadius: 8, border: `1px solid ${C.border}`, background: C.surface2, fontSize: 12, color: C.text, outline: "none" }}
          />
          <button onClick={() => { const s = parseInt(custom); if (s > 0) { handleSelect(s); setCustom(""); } }}
            style={{ padding: "6px 14px", borderRadius: 8, border: "none", background: C.accent, color: "#fff", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
            설정
          </button>
        </div>
      </div>
    </Modal>
  );
}

// ── 야추 점수판 ───────────────────────────────
function ScoreSheetModal({ gameName, onClose }) {
  const UPPER = [
    { id: "ones",   label: "1 (에이스)",  max: 5  },
    { id: "twos",   label: "2 (듀스)",    max: 10 },
    { id: "threes", label: "3 (쓰리)",    max: 15 },
    { id: "fours",  label: "4 (포스)",    max: 20 },
    { id: "fives",  label: "5 (파이브)",  max: 25 },
    { id: "sixes",  label: "6 (식스)",    max: 30 },
  ];
  const LOWER = [
    { id: "three_kind",  label: "3 of a Kind", hint: "같은 숫자 3개 이상 → 합계" },
    { id: "four_kind",   label: "4 of a Kind", hint: "같은 숫자 4개 이상 → 합계" },
    { id: "full_house",  label: "Full House",  hint: "3+2 조합 → 25점" },
    { id: "sm_straight", label: "Sm. Straight",hint: "4연속 → 30점" },
    { id: "lg_straight", label: "Lg. Straight",hint: "5연속 → 40점" },
    { id: "yahtzee",     label: "🎲 야추!",    hint: "5개 같은 숫자 → 50점" },
    { id: "chance",      label: "Chance",      hint: "5개 주사위 합계" },
  ];

  const [players, setPlayers] = useState(["나", "상대"]);
  const [newPlayer, setNewPlayer] = useState("");
  const [scores, setScores] = useState({});

  const setScore = (p, cat, v) => setScores(prev => ({ ...prev, [`${p}_${cat}`]: v === "" ? "" : Number(v) }));
  const getScore = (p, cat) => { const v = scores[`${p}_${cat}`]; return v !== undefined ? v : ""; };
  const upperSum = (p) => UPPER.reduce((s, c) => s + (getScore(p, c.id) !== "" ? Number(getScore(p, c.id)) : 0), 0);
  const bonus = (p) => upperSum(p) >= 63 ? 35 : 0;
  const lowerSum = (p) => LOWER.reduce((s, c) => s + (getScore(p, c.id) !== "" ? Number(getScore(p, c.id)) : 0), 0);
  const total = (p) => upperSum(p) + bonus(p) + lowerSum(p);

  const addPlayer = () => {
    if (newPlayer.trim() && players.length < 6) {
      setPlayers(prev => [...prev, newPlayer.trim()]);
      setNewPlayer("");
    }
  };

  const cellStyle = { padding: "5px 4px", borderBottom: `1px solid ${C.border}`, verticalAlign: "middle" };
  const inputStyle = (p, c) => ({
    width: "100%", padding: "4px 2px", textAlign: "center",
    background: getScore(p, c) !== "" ? C.accentDim : C.surface2,
    border: `1px solid ${getScore(p, c) !== "" ? C.accent+"55" : C.border}`,
    borderRadius: 4, color: C.text, fontSize: 13, outline: "none", boxSizing: "border-box",
  });

  return (
    <Modal title={`📝 점수판 — ${gameName || "야추"}`} onClose={onClose}>
      {/* 플레이어 관리 */}
      <div style={{ display: "flex", gap: 6, marginBottom: 14, flexWrap: "wrap", alignItems: "center" }}>
        {players.map((p, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 2, background: C.accentDim, borderRadius: 6, padding: "3px 8px 3px 10px" }}>
            <span style={{ fontSize: 12, fontWeight: 600, color: C.accent }}>{p}</span>
            {players.length > 1 && (
              <button onClick={() => setPlayers(prev => prev.filter((_, idx) => idx !== i))}
                style={{ background: "none", border: "none", cursor: "pointer", color: C.accent, fontSize: 14, padding: "0 2px", lineHeight: 1 }}>×</button>
            )}
          </div>
        ))}
        {players.length < 6 && (
          <div style={{ display: "flex", gap: 4 }}>
            <input value={newPlayer} onChange={e => setNewPlayer(e.target.value)} onKeyDown={e => e.key === "Enter" && addPlayer()}
              placeholder="플레이어 추가"
              style={{ padding: "4px 8px", borderRadius: 6, border: `1px solid ${C.border}`, fontSize: 11, background: C.surface2, color: C.text, outline: "none", width: 88 }} />
            <button onClick={addPlayer} style={{ padding: "4px 10px", borderRadius: 6, border: "none", background: C.accent, color: "#fff", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>+</button>
          </div>
        )}
      </div>

      <div style={{ overflowX: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
          <thead>
            <tr style={{ background: C.surface2 }}>
              <th style={{ padding: "8px 6px", textAlign: "left", fontSize: 11, color: C.textDim, fontWeight: 700, minWidth: 110 }}>항목</th>
              {players.map(p => <th key={p} style={{ padding: "8px 6px", fontSize: 12, fontWeight: 700, color: C.accent, textAlign: "center", minWidth: 56 }}>{p}</th>)}
            </tr>
          </thead>
          <tbody>
            <tr><td colSpan={players.length + 1} style={{ padding: "8px 4px 3px", fontSize: 10, fontWeight: 700, color: C.textDim, letterSpacing: 0.5 }}>▷ 상단 (Upper Section)</td></tr>
            {UPPER.map(cat => (
              <tr key={cat.id}>
                <td style={{ ...cellStyle, fontSize: 12, color: C.textSub }}>{cat.label}</td>
                {players.map(p => (
                  <td key={p} style={{ ...cellStyle, textAlign: "center" }}>
                    <input type="number" min="0" max={cat.max} value={getScore(p, cat.id)} onChange={e => setScore(p, cat.id, e.target.value)} style={inputStyle(p, cat.id)} />
                  </td>
                ))}
              </tr>
            ))}
            <tr style={{ background: C.surface2 }}>
              <td style={{ ...cellStyle, fontWeight: 700, fontSize: 11, color: C.textSub }}>소계</td>
              {players.map(p => <td key={p} style={{ ...cellStyle, textAlign: "center", fontWeight: 700, fontSize: 13 }}>{upperSum(p)}</td>)}
            </tr>
            <tr style={{ background: upperSum(players[0]) >= 63 ? "#d1fae5" : "#fef9c3" }}>
              <td style={{ ...cellStyle, fontSize: 11, color: "#065f46", fontWeight: 600 }}>보너스 (63점↑ → +35)</td>
              {players.map(p => {
                const b = bonus(p);
                const u = upperSum(p);
                return (
                  <td key={p} style={{ ...cellStyle, textAlign: "center", fontWeight: 700, fontSize: 13, color: b > 0 ? "#16a34a" : "#92400e" }}>
                    {b > 0 ? "+35" : `${63 - u}부족`}
                  </td>
                );
              })}
            </tr>
            <tr><td colSpan={players.length + 1} style={{ padding: "8px 4px 3px", fontSize: 10, fontWeight: 700, color: C.textDim, letterSpacing: 0.5 }}>▷ 하단 (Lower Section)</td></tr>
            {LOWER.map(cat => (
              <tr key={cat.id}>
                <td style={{ ...cellStyle }}>
                  <div style={{ fontSize: 12, color: C.text, fontWeight: cat.id === "yahtzee" ? 700 : 400 }}>{cat.label}</div>
                  <div style={{ fontSize: 10, color: C.textDim }}>{cat.hint}</div>
                </td>
                {players.map(p => (
                  <td key={p} style={{ ...cellStyle, textAlign: "center" }}>
                    <input type="number" min="0" max={50} value={getScore(p, cat.id)} onChange={e => setScore(p, cat.id, e.target.value)} style={inputStyle(p, cat.id)} />
                  </td>
                ))}
              </tr>
            ))}
            <tr style={{ background: C.accentDim, borderTop: `2px solid ${C.accent}` }}>
              <td style={{ ...cellStyle, fontWeight: 800, color: C.accent, fontSize: 14 }}>🏆 총점</td>
              {players.map(p => (
                <td key={p} style={{ ...cellStyle, textAlign: "center", fontWeight: 800, color: C.accent, fontSize: 16 }}>{total(p)}</td>
              ))}
            </tr>
          </tbody>
        </table>
      </div>
      <button onClick={() => { if (window.confirm("점수판을 초기화할까요?")) setScores({}); }}
        style={{ marginTop: 12, padding: "9px 0", borderRadius: 8, border: `1px solid ${C.border}`, background: C.surface2, color: C.textDim, fontSize: 12, cursor: "pointer", width: "100%", fontWeight: 600 }}>
        🔄 점수판 초기화
      </button>
    </Modal>
  );
}

// ── 공통 컴포넌트 ──────────────────────────────
function Modal({ title, children, onClose }) {
  return (
    <div style={{ position: "fixed", inset: 0, background: "#000000bb", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 50, padding: 16 }}
      onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: "16px 16px 12px 12px", width: "100%", maxWidth: 520, maxHeight: "90vh", overflow: "hidden", display: "flex", flexDirection: "column" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "16px 20px", borderBottom: `1px solid ${C.border}`, flexShrink: 0 }}>
          <span style={{ fontWeight: 700, fontSize: 16 }}>{title}</span>
          <button onClick={onClose} style={{ background: C.surface2, border: "none", borderRadius: "50%", width: 28, height: 28, color: C.textSub, cursor: "pointer", fontSize: 14 }}>✕</button>
        </div>
        <div style={{ padding: 20, overflowY: "auto" }}>{children}</div>
      </div>
    </div>
  );
}

function Btn({ children, onClick, size = "md" }) {
  const [hover, setHover] = useState(false);
  return (
    <button onClick={onClick}
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{ padding: size === "sm" ? "6px 12px" : "8px 16px", borderRadius: 8, border: "none", background: hover ? C.accentHover : C.accent, color: "#fff", fontWeight: 600, fontSize: size === "sm" ? 12 : 13, cursor: "pointer", transition: "background .15s", whiteSpace: "nowrap" }}>
      {children}
    </button>
  );
}

function IconBtn({ children, onClick, title, danger }) {
  const [hover, setHover] = useState(false);
  return (
    <button onClick={onClick} title={title}
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{ padding: "6px", borderRadius: 6, border: "none", background: hover ? (danger ? "#7f1d1d44" : C.accentDim) : "none", cursor: "pointer", fontSize: 14 }}>
      {children}
    </button>
  );
}

function StatCard({ title, children }) {
  return (
    <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: 18 }}>
      <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 14 }}>{title}</div>
      {children}
    </div>
  );
}

function InfoSection({ label, children }) {
  return (
    <div style={{ marginBottom: 12, padding: "10px 12px", background: C.surface2, borderRadius: 8, borderLeft: `3px solid ${C.accent}` }}>
      <div style={{ fontSize: 11, fontWeight: 700, color: C.accent, marginBottom: 4 }}>{label}</div>
      {children}
    </div>
  );
}

function Field({ label, children }) {
  return (
    <div>
      <label style={{ display: "block", fontSize: 11, fontWeight: 600, color: C.textSub, marginBottom: 5 }}>{label}</label>
      {children}
    </div>
  );
}

function Input(props) {
  return (
    <input {...props}
      style={{ width: "100%", padding: "9px 12px", background: C.surface2, border: `1px solid ${C.border}`, borderRadius: 8, color: C.text, fontSize: 13, outline: "none", boxSizing: "border-box" }} />
  );
}

function Select({ children, ...props }) {
  return (
    <select {...props}
      style={{ width: "100%", padding: "9px 12px", background: C.surface2, border: `1px solid ${C.border}`, borderRadius: 8, color: C.text, fontSize: 13, outline: "none", boxSizing: "border-box" }}>
      {children}
    </select>
  );
}

function Textarea(props) {
  return (
    <textarea {...props}
      style={{ width: "100%", padding: "9px 12px", background: C.surface2, border: `1px solid ${C.border}`, borderRadius: 8, color: C.text, fontSize: 13, outline: "none", boxSizing: "border-box", resize: "vertical" }} />
  );
}
